name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install flet ccxt requests
          
      - name: Install Flutter & Android toolchains for Flet
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          
      - name: Build APK with Flet
        run: |
          flet build apk --target android
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: QuantTrader-APK
          path: build/apk/**/*.apk
